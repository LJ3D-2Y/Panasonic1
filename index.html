<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Panasonic UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

  <div id="loginPage" class="page">
    <div class="top"></div>

    <div class="card">

        <div class="img">
<img src="Assests/Panasonic-logo-removebg-preview.png">
</div>

      <input type="text" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <div class="options">
  <label class="remember me">
    <input type="checkbox">
    <span>Remember me</span>
  </label>

  <span class="forgot">Forgot Password?</span>
</div>

      <button onclick="login()">Log in</button>

      <p class="signup">Don’t have an account? <b>Sign up</b></p>
    </div>
  </div>

  <div id="secondPage" class="page hidden">
    <div class="card">

      <h2 class="title">TODAY’S PERFORMANCE</h2>

      <div class="progress">
        <div class="circle">70%</div>
      </div>

      <div class="scroll">
        <div class="item">Customer Focus <span class="orange"></span></div>
        <div class="item">Drives Focus <span class="green"></span></div>
        <div class="item">Builds Trust <span class="green"></span></div>
        <div class="item">Best Work Processes <span class="green"></span></div>
        <div class="item">Ownership <span class="orange"></span></div>
        <div class="item">Evolution <span class="green"></span></div>
        <div class="item">Harmonize Wisdom <span class="green"></span></div>
        <div class="item">Welcomes Uniqueness <span class="green"></span></div>
        <div class="item">People First <span class="green"></span></div>
        <div class="item">Drives Result <span class="orange"></span></div>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
